  MajManatee:
  - bugfix: Smoke blowing emote perspective is now correct.
  Melbert:
  - rscadd: Adds Tourniquets. While attached to a limb, reduces blood loss from that
      limb by 90%, but makes you walk / interact slower. (Or if you put it on your
      head, you die.)
  - rscadd: You can purchase Tourniquets from the premium section of the medical vendor
  - rscadd: 'Paramedic belt setup has changed yet again: Surgical tape replaced with
      Tourniquet, Bone gel replaced with Bonesetter.'
  - rscadd: You can use all forms of tape as splint - like Gauze. Will secure a fracture
      but won't stop your blood from exiting.
  - refactor: Refactored gauze entirely, report any strangeness with it (or tape,
      or tourniquets)
  - bugfix: Tourniquet fits in medkits and medbelts
  - refactor: Rewrites how addiction points are applied from reagents. Some reagents
      may be marginally more or less addictive as a consequence.
  - balance: Addiction gained per metabolism tick now scales to the amount of reagents
      metabolized. In other words if you metabolize 0.2 units instead of the expected
      0.4 units, you get 0.5x of the amount of addiction gain. This ultimately changes
      very little and I would imagine it's how most people expected it to work in
      the first place...
  - rscadd: Cerdits siphoned from the vault are output as space cash rather than as
      holochips
  - qol: If an airlock pump's link is broken, it unbolts all airlocks
  - qol: Paper UI now updates immediately when you pick up or drop a writing tool.
  - qol: The roundstart command report has had its style updated, and now contains
      some bonus lore.
  - admin: Changes the perms needed to add command report footnotes to "Fun" rather
      than "Admin"
  - admin: Adds a verb for changing the command report main contents (Requiring "Fun")
  - config: Adds a config for hiding the dynamic report, disabled by default (disabled
      meaning you still get the report)
  - balance: When the Paddy enables its sirens, it also enables overclock mode, speeding
      it up 1.5x.
  - balance: Paddy is forced onto overclock safety mode, meaning said overclock will
      self-disable eventually.
  - bugfix: Fixes Changlings transformed into a Felinid losing decap immunity thanks
      to their newly shrunken brain
  - rscdel: Cytology creations no longer have a random chance to fail if another sample
      in the vat has growth process. All growth is still reset on any successful creation.
      As growth failure has been removed, some cell lines that had unique fail interactions
      have been altered.
  - rscadd: Clown cell lines are now all boosted by supplying mutagen. However, using
      mutagen may cause a mutant clown to spawn. (Before, failure caused a mutant
      clown to spawn.)
  - rscadd: Queen bee lines now alternate between spawning a queen bee and a swarm
      of bees. (Before, failure caused a swarm of bees to spawn.)
  - rscadd: Cytology created bees have a rare chance of having a random toxin.
  - balance: Revamped echolocation effect entirely. Now updates constantly, rather
      than on a cooldown.
  - balance: Echolocaters can filter out certain objects that they would really prefer
      not to see at the moment.
  - balance: Echolocaters are mechanically (but not visually) blind, which means they
      have flash immunity and whatnot. Because of course they are.
  - balance: Echolocater lose their ability to echolocate if they've gone deaf. Then
      you're truly fully blind.
  - balance: Echolocaters can see (or rather, hear) mobs through walls.
  - refactor: Refactored Prosopagnosia to make the effect a bit more generic.
  - rscadd: When you get absorbed by a changeling, you get made into an imaginary
      friend of the changeling that absorbed you.
  - refactor: Refactored how people are returned to their bodies after occupying separate
      bodies, such as bitrunners and ghost roles. Report any oddities or failure to
      return correctly.

2026-03-09:
  MacaroniCritter:
  - rscadd: The naval uniform and cap can now be recolored
  - image: Revamped the naval uniform icons for the HOP, Captain, RD, HOS, and CE
  - image: Added naval uniforms for the Blueshield, Bridge Officer, NT Rep, QM

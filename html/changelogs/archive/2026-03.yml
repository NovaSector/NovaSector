2026-03-13:
  Geoengi:
  - rscadd: Mediguns now have a lore blurb!
  - rscdel: Removes the AFAD.
  - bugfix: Mediguns no longer work on synthetics.
  - bugfix: Hardlight salve cells now actually work.
  - balance: The four healing-type medigun cells now apply disgust and nutrition drain
      proportional to their tier. Under certain hunger thresholds, the disgust gain
      becomes increasingly multiplied.
  - balance: Also proportional to their tier, healing thresholds for medigun cells
      in each damage type have been given a spread of 20, 30, 40 for tier I, II, and
      III, respectively. Oxygen cells are exempt.
  - balance: The upgraded medigun gets another cell slot, up to four.
  - balance: The CMO's medigun now has five cell slots.
  - balance: Healing globules can only have one attached per limb, but no longer delete
      if there's no current damage to heal.
  - map: Tarkon's lost its AFAD. Though, not its only starting healing beam...
  - spellcheck: Standardizes the name "Vey-Medical" or "Vey-Med" in all applicable
      mentions.
  - code_imp: Removes redundant code relating to toggling the safe mode in medigun
      cells.
  Skies-Of-Blue:
  - rscadd: Adds two greyscaleable variants of the existing robotic limbs to the Augments+
      tab
  - rscadd: Adds seven new species-based reskins to robotic limbs, as well as adding
      the synth "Default Chassis" as a reskin option
  - image: Added sprites to support the above
2026-03-17:
  00-Steven:
  - bugfix: Exporting stock blocks no longer uses its own elasticity value separate
      from the materials exports, and no longer erroneously shows the stock block
      elasticity instead of the material elasticity in the GMM for the material of
      the most recently sold stock block.
  - bugfix: Trying to insert an item into a vendor that has reached its maximum capacity
      for that item no longer says "no space for any more /list", and no longer TRIES
      to say it has too much of that category. It now correctly says it can't accept
      any more of that item.
  - bugfix: Trying to insert an item into a vendor that can hold it but you can't
      put it in no longer both says you insert the item into its input compartment
      while also sending an error message about not being able to put it in.
  - bugfix: Trying to insert an item into a vendor that can't hold it no longer sends
      the error message twice.

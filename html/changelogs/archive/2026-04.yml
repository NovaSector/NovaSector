      You can now hover over it to see exact cell percentage, and click it to turn
      the regulator on, while it'll also display when it's off.
  - qol: Changeling's stat panel entry has been moved to the HUD & Antag panel. Also
      added some extra explanations on how Changelings work in there.
  Kashargul:
  - bugfix: admin spawn panel persistent paths, panel offsets, panel diagonal dirs

      gotten a little too silly, making canisters with a painting Half-Life of approximately
      Two.
  - qol: Mining scanners can now attach holotags to rocky debris of interest to xenoarchaeologists.
  - qol: 'Following lobbying from Big High-Performance Thermoplastic, Nanotrasen has
      begun issuing ore box reinforcement kits to their mining teams, which can be
      found in their lockers and used to make an ore box thermally insulated (read:
      fire/lavaproof).'
  OrbisAnima:
  - qol: Fishing and Xenoarch tech no longer require an experiment.
  - refactor: Refactored lesser Xenoarch ( strange rocks one, not the big rocks one),
      more accessible to people, too many details for it, read the PR 7034, short
      of it, you use a radar to find rocks now, and they have better loot, use a brush
      to recover items, and no more automated ways of getting the rocks.
  - rscadd: added the Assistant formal winter coat to the clothesmate.
  - balance: While strange rocks clusters are much more rare in mining, they now have

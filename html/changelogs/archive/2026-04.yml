2026-04-01:
  DATA-xPUNGED:
  - admin: When forcing an earthquake, admins can now pick their precise position
      on the station.
  Hatterhat:
  - qol: The Free Trade Union, citing one customer complaint, remembered that they
      have a source for webbing and webbing-like accessories and has patched them
      into Nanotrasen's goodies market.
  - qol: Installing electronics into windoors/interior doors only moves the electronics
      out of your hand on a successful installation.
  - balance: Upgraded exoscanners no longer have skyrocketing power draw when upgraded,
      following an incident where a station's chief engineer declared vendetta upon
      their Cargo department for drawing an excessive amount of power, resulting in
      massive casualties.
  - bugfix: Integrated circuit shells now only explode if they draw too much power
      in a minute, rather than being doomed to explode if it uses too much power over
      its entire lifetime, following complaints from at least one guy. Nanotrasen
      representatives claim that this is entirely unrelated to missing shipments of
      explosive alloys.

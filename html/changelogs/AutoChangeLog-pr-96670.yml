author: "SmArtKar"
delete-after: True
changes:
  - rscadd: "Added a magmawing variant of watcher wreaths"
  - rscadd: "Magmawing and icewing watchers now drop unique sinew that can be crafted into wreaths or trophies"
  - rscadd: "Reworked colossus blaster tubes, and magmawing/icewing wing crusher trophies."
  - balance: "Crusher trophies are no longer random drops, and instead are crafted from mob drops."
  - balance: "Wildhunter knife now refunds a large portion of components used to craft a trophy, and its butchering bonus has been buffed from 10% to 25%"
  - bugfix: "Fixed goliath trophy stating it deals 2 times less HP than it does in reality in its description."
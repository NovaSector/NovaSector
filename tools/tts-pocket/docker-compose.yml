services:
  tts-pocket:
    container_name: tts-pocket
    build: .
    ports:
      - "127.0.0.1:5002:5002"
    restart: unless-stopped
    environment:
      TTS_AUTHORIZATION_TOKEN: ${TTS_AUTHORIZATION_TOKEN:-coolio}
      POCKETTTS_LANGUAGE: ${POCKETTTS_LANGUAGE:-english}
      POCKETTTS_QUANTIZE: ${POCKETTTS_QUANTIZE:-1}
      POCKETTTS_ENABLE_PITCH: ${POCKETTTS_ENABLE_PITCH:-0}
      POCKETTTS_PRELOAD_MODEL: ${POCKETTTS_PRELOAD_MODEL:-0}
      POCKETTTS_PRELOAD_VOICES: ${POCKETTTS_PRELOAD_VOICES:-0}
      POCKETTTS_BACKGROUND_WARMUP: ${POCKETTTS_BACKGROUND_WARMUP:-1}
      POCKETTTS_WARMUP_VOICES: ${POCKETTTS_WARMUP_VOICES:-all}
      POCKETTTS_RESPONSE_CACHE: ${POCKETTTS_RESPONSE_CACHE:-1}
      POCKETTTS_LOG_TIMINGS: ${POCKETTTS_LOG_TIMINGS:-1}
      POCKETTTS_WORKERS: ${POCKETTTS_WORKERS:-4}
      POCKETTTS_THREADS: ${POCKETTTS_THREADS:-1}
      POCKETTTS_TORCH_THREADS: ${POCKETTTS_TORCH_THREADS:-2}
      POCKETTTS_WORKER_TIMEOUT: ${POCKETTTS_WORKER_TIMEOUT:-180}
      HF_HOME: /app/cache/huggingface
      XDG_CACHE_HOME: /app/cache
    volumes:
      - ./voices.json:/app/voices.json
      - ./voices:/app/voices
      - ./cache:/app/cache
